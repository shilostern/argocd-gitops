apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: whoami-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/YOUR_USERNAME/YOUR_REPO_NAME.git'
    targetRevision: HEAD
    path: apps/whoami/environments/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: whoami-dev
  syncPolicy:
    automated:
      prune: true     
      selfHeal: true  
    syncOptions:
      - CreateNamespace=true