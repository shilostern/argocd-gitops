apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: whoami-dev
  namespace: argocd
spec:
  project: default
  source:
    # URL of your Git repository where the manifests are stored
    repoURL: 'https://github.com/YOUR_USERNAME/YOUR_REPO_NAME.git'
    targetRevision: HEAD
    # Path inside the repo pointing to the Dev overlay
    path: apps/whoami/environments/dev
  destination:
    # Cluster URL (in-cluster refers to the local Kind cluster where ArgoCD is running)
    server: 'https://kubernetes.default.svc'
    namespace: whoami-dev
  syncPolicy:
    automated:
      prune: true     # Automatically deletes resources removed from Git
      selfHeal: true  # Automatically fixes manual drift caused in the cluster
    createNamespace: true # Creates the 'whoami-dev' namespace if it doesn't exist
