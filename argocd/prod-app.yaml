apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: whoami-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/YOUR_USERNAME/YOUR_REPO_NAME.git'
    targetRevision: HEAD
    # Path inside the repo pointing to the Prod overlay
    path: apps/whoami/environments/prod
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: whoami-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true # Creates the 'whoami-prod' namespace if it doesn't exist
