apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inherit baseline resources
resources:
  - ../../base

# Prod-specific overrides using Strategic Merge Patch
patchesStrategicMerge:
  - |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: whoami
    spec:
      template:
        spec:
          containers:
            - name: whoami
              env:
                - name: ENV_NAME
                  value: "production"

# High availability setup for production workloads
replicas:
  - name: whoami
    count: 9

# Resource isolation and naming strategy
namespace: whoami-prod
nameSuffix: -prod
