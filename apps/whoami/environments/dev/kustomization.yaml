apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inherit baseline resources
resources:
  - ../../base
  - ../../components/environment-variables

# Dev-specific overrides and environment variables
patches:
  - target:
      kind: Deployment
      name: whoami
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "development"

# Scaled down replica count for development environment stability
replicas:
  - name: whoami
    count: 3

# Resource isolation and naming strategy
namespace: whoami-dev
nameSuffix: -dev
