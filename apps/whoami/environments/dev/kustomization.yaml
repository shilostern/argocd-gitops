apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inherit baseline resources
resources:
  - ../../base

# Dev-specific overrides using Strategic Merge Patch
patchesStrategicMerge:
  - |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: whoami
    spec:
      template:
        spec:
          containers:
            - name: whoami
              env:
                - name: ENV_NAME  # שנה לשם המשתנה המדויק שהאפליקציה שלך מצפה לו
                  value: "development"

# Scaled down replica count for development environment stability
replicas:
  - name: whoami
    count: 3

# Resource isolation and naming strategy
namespace: whoami-dev
nameSuffix: -dev