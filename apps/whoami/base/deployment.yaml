apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
spec:
  # Note: Replicas count is omitted here as it is managed by environment overlays
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
      - name: whoami
        image: localhost/traefik/whoami:v1.8.0
        ports:
        - containerPort: 80
